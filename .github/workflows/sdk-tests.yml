name: SDK Tests

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - ".github/workflows/sdk-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          pip install pytest pytest-cov
          pip install -e ".[langchain,openai]"

      - name: Run unit tests with coverage
        env:
          TRUST_SIGNING_KEY: ci-test-key
        run: pytest tests/ --ignore=tests/integration -x -q --tb=short --cov=air_blackbox --cov-report=term-missing --cov-fail-under=70

      - name: Run integration tests (LangChain + OpenAI)
        env:
          TRUST_SIGNING_KEY: ci-test-key
        run: pytest tests/integration/test_langchain_integration.py tests/integration/test_openai_integration.py -x -q --tb=short

      - name: Verify CLI loads
        run: |
          python -c "from air_blackbox.cli import main; print('CLI OK')"
          python -c "from air_blackbox import __version__; print(f'v{__version__}')"

  integration-crewai:
    runs-on: ubuntu-latest
    name: Integration (CrewAI)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with CrewAI
        run: |
          pip install pytest
          pip install -e .
          pip install crewai || echo "CrewAI install failed -- skipping"

      - name: Run CrewAI integration tests
        env:
          TRUST_SIGNING_KEY: ci-test-key
        run: pytest tests/integration/test_crewai_integration.py -x -q --tb=short || echo "CrewAI tests skipped"

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and ruff
        run: |
          pip install -e .
          pip install ruff

      - name: Ruff lint check
        run: ruff check sdk/air_blackbox/

      - name: Ruff format check
        run: ruff format sdk/air_blackbox/ --check --diff

      - name: Check imports resolve
        run: |
          python -c "from air_blackbox.compliance.engine import run_all_checks"
          python -c "from air_blackbox.injection.detector import InjectionDetector"
          python -c "from air_blackbox.attestation.schema import AttestationRecord"
          python -c "from air_blackbox.evidence.signer import EvidenceSigner"
          python -c "from air_blackbox.trust.chain import AuditChain"
          echo "All critical imports OK"
