name: SDK Tests

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/sdk-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/**"
      - "tests/**"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[langchain,openai]"

      - name: Run tests
        env:
          TRUST_SIGNING_KEY: ci-test-key
        run: pytest tests/ -x -q --tb=short

      - name: Verify CLI loads
        run: |
          python -c "from air_blackbox.cli import main; print('CLI OK')"
          python -c "from air_blackbox import __version__; print(f'v{__version__}')"

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Check imports resolve
        run: |
          python -c "from air_blackbox.compliance.engine import run_all_checks"
          python -c "from air_blackbox.injection.detector import InjectionDetector"
          python -c "from air_blackbox.attestation.schema import AttestationRecord"
          python -c "from air_blackbox.evidence.signer import EvidenceSigner"
          python -c "from air_blackbox.trust.chain import AuditChain"
          echo "All critical imports OK"
