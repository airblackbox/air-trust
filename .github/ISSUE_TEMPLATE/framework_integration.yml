name: Framework Integration Request
description: Request a trust layer for a framework not yet supported
labels: ["integration", "enhancement"]
body:
  - type: input
    id: framework
    attributes:
      label: Framework name
      placeholder: "e.g. Pydantic AI, Agno, Smolagents"
    validations:
      required: true
  - type: input
    id: docs
    attributes:
      label: Framework docs or repo
    validations:
      required: true
  - type: dropdown
    id: willing-to-test
    attributes:
      label: Can you help test a draft integration?
      options:
        - "Yes"
        - "No"
        - "Maybe — depends on timeline"
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: What are you building with it?
